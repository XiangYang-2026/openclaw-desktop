name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build Windows installer
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts (NSIS Installer)
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Desktop-Setup-EXE
          path: dist-release/*.exe
          if-no-files-found: ignore

      - name: Upload artifacts (ZIP Portable)
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Desktop-Portable-ZIP
          path: dist-release/*.zip
          if-no-files-found: ignore

      - name: Upload artifacts (Portable EXE)
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Desktop-Portable-EXE
          path: dist-release/*.exe
          if-no-files-found: ignore

      - name: Create Release (if tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
